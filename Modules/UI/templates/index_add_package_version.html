{% extends "base.html" %}

{% block header %}
    <div>
        <a href="{{ url_for('ui_bp.index') }}" class="btn btn-secondary" style="margin-right: 25px;">
            Back
        </a>
    </div>
{% endblock %}

{% block content %}
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header text-center">
                        <h4>Add Package Version</h4>
                    </div>
                    <div class="card-body">
                        <form method="POST" action="{{ url_for('ui_bp.add_package_version', p_type=p_type) }}" enctype="multipart/form-data" onsubmit="button_Loading('submit_form');">
                            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                            <div class="mb-3">
                                <label for="package_id" class="form-label">Choose a Package</label>
                                <select name="package_id" id="package_id" class="form-control form-control" required>
                                    {% for p in packages %}
                                        <option value="{{ p['PACKAGE_ID'] }}">{{ p['PACKAGE_NAME'] }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="package_version" class="form-label">Package Version</label>
                                <input type="text" class="form-control" id="package_version" name="package_version" placeholder="Package version" maxlength="25" required>
                            </div>

                            <div class="mb-3">
                                <label for="package_local" class="form-label">Locale</label>
                                <select name="package_local" id="package_local" class="form-control" required>
                                    {% for l in locales %}
                                        <option value="{{ l['LOCALE_ID'] }}">{{ l['LOCALE'] }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="file_nested_path" class="form-label">Channel</label>
                                <input type="text" class="form-control" id="channel" name="channel" placeholder="Installer Channel: stable, beta, ..." value="stable" required>
                            </div>

                            <div class="mb-3">
                                <label for="file_architect" class="form-label">Architecture</label>
                                <select name="file_architect" id="file_architect" class="form-control" required>
                                    <option value="x64">x64</option>
                                    <option value="x86">x86</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="upgrades" class="form-label">Upgrade Behavior</label>
                                <select name="upgrades" id="upgrades" class="form-control" required>
                                    <option value="install">install</option>
                                    <option value="uninstallPrevious">uninstallPrevious</option>
                                    <option value="deny">deny</option>
                                </select>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6" id="fileTypeCol">
                                    <label for="file_type" class="form-label">File Type</label>
                                    <select name="file_type" id="file_type" class="form-control" required>
                                        <option value="EXE">EXE</option>
                                        <option value="MSI">MSI</option>
                                        <option value="MSIX">MSIX</option>
                                        <option value="APPX">APPX</option>
                                        <option value="ZIP">ZIP</option>
                                        <option value="INNO">INNO</option>
                                        <option value="NULLSOFT">NULLSOFT</option>
                                        <option value="WIX">WIX</option>
                                        <option value="BURN">BURN</option>
                                    </select>
                                </div>

                                <div class="col-md-6" id="nestedTypeGroup">
                                    <label for="file_type_nested" class="form-label">Nested File Type</label>
                                    <select name="file_type_nested" id="file_type_nested" class="form-control">
                                        <option value="" selected></option>
                                        <option value="EXE">EXE</option>
                                        <option value="MSI">MSI</option>
                                        <option value="MSIX">MSIX</option>
                                        <option value="APPX">APPX</option>
                                        <option value="INNO">INNO</option>
                                        <option value="NULLSOFT">NULLSOFT</option>
                                        <option value="WIX">WIX</option>
                                        <option value="BURN">BURN</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3" id="nestedPathGroup">
                                <label for="file_nested_path" class="form-label">Nested File Path (in ZIP)</label>
                                <input type="text" class="form-control" id="file_nested_path" name="file_nested_path" placeholder="Nested File Path">
                            </div>

                            <div class="mb-3" id="productCodeGroup">
                                <label for="file_nested_path" class="form-label">ProductCode (Optional)</label>
                                <input type="text" class="form-control" id="productcode" name="productcode" placeholder="Installer ProductCode">
                            </div>

                            <div class="mb-3" id="upgradeCodeGroup">
                                <label for="file_nested_path" class="form-label">UpgradeCode (Optional)</label>
                                <input type="text" class="form-control" id="upgradecode" name="upgradecode" placeholder="Installer UpgradeCode">
                            </div>

                            <div class="mb-3" id="packageFamilyNameGroup">
                                <label for="file_nested_path" class="form-label">Package Family Name (Optional)</label>
                                <input type="text" class="form-control" id="package_family_name" name="package_family_name" placeholder="Package Family Name">
                            </div>

                            <div class="mb-3">
                                <label for="file" class="form-label">Package File</label>
                                <input type="file" class="form-control" id="file" name="file">
                                <div class="form-text text-muted">Either upload a file <strong>or</strong> provide a URL.</div>
                            </div>

                            <div class="mb-3">
                                <label for="installer_url" class="form-label">Installer URL (Internet required)</label>
                                <input type="url" class="form-control" id="installer_url" name="installer_url" placeholder="https://example.com/installer.exe">
                            </div>

                            <div class="mb-3">
                                <label for="file_scope" class="form-label">Scope</label>
                                <select name="file_scope" id="file_scope" class="form-control" required>
                                    <option value="machine">Machine</option>
                                    <option value="user">User</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Switch Options (Optional)</label>
                                <div class="d-flex flex-column">
                                    <input type="text" class="form-control mb-2" name="switch_Silent" placeholder="Silent">
                                    <input type="text" class="form-control mb-2" name="switch_SilentWithProgress" placeholder="Silent with progress">
                                    <input type="text" class="form-control mb-2" name="switch_Interactive" placeholder="Interactive">
                                    <input type="text" class="form-control mb-2" name="switch_InstallLocation" placeholder="Install Location">
                                    <input type="text" class="form-control mb-2" name="switch_Log" placeholder="Log">
                                    <input type="text" class="form-control mb-2" name="switch_Upgrade" placeholder="Upgrade">
                                    <input type="text" class="form-control mb-2" name="switch_Custom" placeholder="Custom">
                                    <input type="text" class="form-control mb-2" name="switch_Repair" placeholder="Repair">
                                </div>
                            </div>

                            <h6 class="mb-3">Dependencies (Optional)</h6>

                            <div class="mb-3">
                                <label class="form-label">Windows Features</label>
                                <div id="windowsFeaturesList">
                                    <div class="input-group mb-2">
                                        <input type="text" class="form-control" name="dep_windows_features" placeholder="z.B. IIS-WebServer">
                                        <button type="button" class="btn btn-outline-danger" onclick="removeEntry(this)">✕</button>
                                    </div>
                                </div>
                                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="addEntry('windowsFeaturesList', 'dep_windows_features', 'z.B. NetFx3')">+ Add Feature</button>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Windows Libraries</label>
                                <div id="windowsLibrariesList">
                                    <div class="input-group mb-2">
                                        <input type="text" class="form-control" name="dep_windows_libraries" placeholder="z.B. VC++ Redistributable">
                                        <button type="button" class="btn btn-outline-danger" onclick="removeEntry(this)">✕</button>
                                    </div>
                                </div>
                                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="addEntry('windowsLibrariesList', 'dep_windows_libraries', 'z.B. VC++ Redistributable')">+ Add Library</button>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Package Dependencies</label>
                                <div id="packageDependenciesList">
                                    <div class="card p-2 mb-2 bg-light dep-pkg-entry">
                                        <div class="mb-2">
                                            <input type="text" class="form-control" name="dep_pkg_identifier" placeholder="Package Identifier (z.B. Microsoft.VCRedist.2015+.x64)">
                                        </div>
                                        <div class="input-group">
                                            <input type="text" class="form-control" name="dep_pkg_min_version" placeholder="Minimum Version (Optional)">
                                            <button type="button" class="btn btn-outline-danger" onclick="removeEntry(this, '.dep-pkg-entry')">✕</button>
                                        </div>
                                    </div>
                                </div>
                                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="addPackageDependency()">+ Add Package Dependency</button>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">External Dependencies</label>
                                <div id="externalDependenciesList">
                                    <div class="input-group mb-2">
                                        <input type="text" class="form-control" name="dep_external" placeholder="z.B. Hardware-Driver XY">
                                        <button type="button" class="btn btn-outline-danger" onclick="removeEntry(this)">✕</button>
                                    </div>
                                </div>
                                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="addEntry('externalDependenciesList', 'dep_external', 'z.B. Hardware-Driver XY')">+ Add External Dependency</button>
                            </div>
                            <hr>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary" id="submit_form">Add Package Version</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const packages = document.getElementById("package_id");
        const savedPackage = sessionStorage.getItem("selected_package");

        if (savedPackage) {
            packages.value = savedPackage;
        }

        packages.addEventListener("change", function () {
            sessionStorage.setItem("selected_package", packages.value);
        });


        function toggleNestedFields() {
            const fileType = document.getElementById("file_type").value;
            const nestedTypeSelect = document.getElementById("file_type_nested");
            const nestedType = nestedTypeSelect ? nestedTypeSelect.value : "";

            const nestedTypeGroup = document.getElementById("nestedTypeGroup");
            const nestedPathGroup = document.getElementById("nestedPathGroup");
            const fileTypeCol = document.getElementById("fileTypeCol");

            const productCodeGroup = document.getElementById("productCodeGroup");
            const upgradeCodeGroup = document.getElementById("upgradeCodeGroup");
            const packageFamilyNameGroup = document.getElementById("packageFamilyNameGroup");

            const isZip = fileType === "ZIP";
            const showNested = isZip;

            nestedTypeGroup.style.display = showNested ? "block" : "none";
            nestedPathGroup.style.display = showNested ? "block" : "none";

            if (nestedTypeSelect) nestedTypeSelect.required = showNested;
            document.getElementById("file_nested_path").required = showNested;

            fileTypeCol.className = showNested ? "col-md-6" : "col-md-12";
            let effectiveType = fileType;

            if (isZip && nestedType) {
                effectiveType = nestedType;
            }

            let showProductCode = false;
            let showUpgradeCode = false;
            let showPackageFamilyName = false;

            switch (effectiveType) {
                case "MSI":
                    showProductCode = true;
                    showUpgradeCode = true;
                    break;

                case "MSIX":
                case "APPX":
                    showPackageFamilyName = true;
                    break;

                case "EXE":
                case "INNO":
                case "NULLSOFT":
                case "BURN":
                    showProductCode = true;
                    showUpgradeCode = true;
                    break;

                case "WIX":
                    showProductCode = true;
                    showUpgradeCode = true;
                    break;

                case "ZIP":
                    break;

                default:
                    break;
            }

            productCodeGroup.style.display = showProductCode ? "block" : "none";
            upgradeCodeGroup.style.display = showUpgradeCode ? "block" : "none";
            packageFamilyNameGroup.style.display = showPackageFamilyName ? "block" : "none";
        }

        document.addEventListener("DOMContentLoaded", function () {
            document.getElementById("file_type").addEventListener("change", toggleNestedFields);
            document.getElementById("file_type_nested").addEventListener("change", toggleNestedFields);
            toggleNestedFields();
        });

        function addEntry(listId, name, placeholder) {
            const list = document.getElementById(listId);
            const div = document.createElement("div");
            div.className = "input-group mb-2";
            div.innerHTML = `
                <input type="text" class="form-control" name="${name}" placeholder="${placeholder}">
                <button type="button" class="btn btn-outline-danger" onclick="removeEntry(this)">✕</button>
            `;
            list.appendChild(div);
        }

        function addPackageDependency() {
            const list = document.getElementById("packageDependenciesList");
            const div = document.createElement("div");
            div.className = "card p-2 mb-2 bg-light dep-pkg-entry";
            div.innerHTML = `
                <div class="mb-2">
                    <input type="text" class="form-control" name="dep_pkg_identifier" placeholder="Package Identifier (z.B. Microsoft.VCRedist.2015+.x64)">
                </div>
                <div class="input-group">
                    <input type="text" class="form-control" name="dep_pkg_min_version" placeholder="Minimum Version (Optional)">
                    <button type="button" class="btn btn-outline-danger" onclick="removeEntry(this, '.dep-pkg-entry')">✕</button>
                </div>
            `;
            list.appendChild(div);
        }

        function removeEntry(btn, selector) {
            const entry = selector ? btn.closest(selector) : btn.parentElement;
            if (entry) entry.remove();
        }

        const fileInput = document.getElementById("file");
        const urlInput = document.getElementById("installer_url");

        fileInput.addEventListener("change", function () {
            urlInput.disabled = !!this.files.length;
            if (this.files.length) urlInput.value = "";
        });

        urlInput.addEventListener("input", function () {
            fileInput.disabled = !!this.value.trim();
        });
    </script>
{% endblock %}
